<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RedCard Factory v4.0 - 智能生成与拖拽版</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background: #f3f4f6; overflow: hidden; }
        
        /* 画布严格 3:4 比例 */
        .canvas-container { width: 450px; height: 600px; background: white; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); overflow: hidden; border: 1px solid #ddd; }
        
        /* 可拖拽元素样式 */
        .draggable { position: absolute; cursor: move; touch-action: none; user-select: none; transition: box-shadow 0.2s; border: 1px border-transparent; }
        .draggable:hover { box-shadow: 0 0 0 2px #3b82f6; border-radius: 4px; }
        
        .glass-box { background: rgba(37, 99, 235, 0.05); border: 1px solid rgba(37, 99, 235, 0.15); border-radius: 12px; padding: 12px; backdrop-filter: blur(8px); }
        .sidebar { width: 320px; height: 100vh; background: white; border-right: 1px solid #e5e7eb; z-index: 10; }
        .active-el { box-shadow: 0 0 0 2px #3b82f6 !important; }
    </style>
</head>
<body class="flex">

<div id="app" class="flex w-full h-screen">
    <div class="sidebar flex flex-col">
        <div class="p-6 border-b">
            <h1 class="text-xl font-black text-blue-600 flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 智能生成
            </h1>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <label class="block text-xs font-bold text-blue-800 mb-2 uppercase tracking-wider">1. 参考布局图</label>
                <div @click="$refs.refInput.click()" class="w-full h-24 border-2 border-dashed border-blue-200 rounded-lg flex items-center justify-center cursor-pointer bg-white hover:bg-blue-50 transition">
                    <span class="text-xs text-blue-400" v-if="!refImage">上传布局样张</span>
                    <img v-else :src="refImage" class="h-full w-full object-cover rounded-lg">
                </div>
                <input type="file" ref="refInput" hidden @change="uploadRef">

                <label class="block text-xs font-bold text-blue-800 mt-4 mb-2 uppercase tracking-wider">2. 营销文案</label>
                <textarea v-model="rawText" class="w-full p-2 text-sm border rounded-lg h-20 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="粘贴你的文案内容..."></textarea>
                
                <button @click="aiGenerate" class="w-full mt-4 bg-blue-600 text-white py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition">
                    解析并生成布局
                </button>
            </div>

            <div v-if="selectedId" class="space-y-4 pt-4 border-t">
                <h3 class="text-xs font-black text-gray-400 uppercase">属性调节: {{selectedId}}</h3>
                <div>
                    <div class="flex justify-between text-[10px] mb-1"><span>缩放比例</span><span>{{elements[selectedId].scale}}x</span></div>
                    <input type="range" v-model="elements[selectedId].scale" min="0.2" max="2.5" step="0.01" class="w-full">
                </div>
                <button @click="resetElement(selectedId)" class="w-full py-1 text-xs text-gray-500 border border-gray-200 rounded">重置位置</button>
            </div>
        </div>

        <div class="p-4 border-t bg-gray-50">
            <button @click="download" class="w-full bg-black text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                <i class="fa-solid fa-download"></i> 导出高清海报
            </button>
        </div>
    </div>

    <div class="flex-1 bg-gray-200 flex items-center justify-center">
        <div id="poster-canvas" class="canvas-container" @mousedown="selectedId = null">
            
            <div class="absolute inset-0 opacity-[0.03] select-none flex items-center justify-center overflow-hidden">
                <span class="text-[120px] font-black rotate-45">GeekDance</span>
            </div>

            <div id="textGroup" class="draggable p-2" 
                 :class="{'active-el': selectedId === 'textGroup'}"
                 :style="getStyle('textGroup')" @mousedown.stop="selectedId = 'textGroup'">
                <h2 class="text-4xl font-black text-gray-900 leading-tight">{{elements.textGroup.title}}</h2>
                <p class="text-xl font-medium text-gray-500 mt-1">{{elements.textGroup.sub}}</p>
            </div>

            <div id="quoteBox" class="draggable glass-box w-[400px]" 
                 :class="{'active-el': selectedId === 'quoteBox'}"
                 :style="getStyle('quoteBox')" @mousedown.stop="selectedId = 'quoteBox'">
                <p class="text-sm text-blue-700 font-bold leading-relaxed">{{elements.quoteBox.text}}</p>
            </div>

            <div id="mainImage" class="draggable" 
                 :class="{'active-el': selectedId === 'mainImage'}"
                 :style="getStyle('mainImage')" @mousedown.stop="selectedId = 'mainImage'">
                <div @click="$refs.mainImgInput.click()" class="cursor-pointer group relative">
                    <img :src="mainImage" class="max-w-xs object-contain" v-if="mainImage">
                    <div v-else class="w-64 h-48 bg-gray-100 flex items-center justify-center text-gray-300 border-2 border-dashed rounded-xl">点击上传素材</div>
                    <div class="absolute inset-0 bg-blue-500/10 opacity-0 group-hover:opacity-100 transition rounded-xl"></div>
                </div>
                <input type="file" ref="mainImgInput" hidden @change="uploadMain">
            </div>

            <div class="absolute bottom-10 left-10 flex items-center justify-between w-[420px] pointer-events-none">
                <img src="https://geekdance.com/wp-content/uploads/2021/01/p_01.png" class="h-8">
                <div class="flex gap-4">
                    <div class="flex items-center gap-1"><i class="fa-solid fa-mobile-screen text-blue-600"></i><span class="text-[10px] font-bold">小程序</span></div>
                    <div class="flex items-center gap-1"><i class="fa-solid fa-tablet-screen-button text-blue-600"></i><span class="text-[10px] font-bold">APP定制</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, watch } = Vue;

    createApp({
        setup() {
            const refImage = ref(null);
            const mainImage = ref(null);
            const rawText = ref('');
            const selectedId = ref(null);

            // 初始化所有元素的状态，支持 localStorage 方案保存
            const elements = ref(JSON.parse(localStorage.getItem('redcard_layout')) || {
                textGroup: { x: 40, y: 60, scale: 1, title: '跨境贸易 AI Agent', sub: '自动监测库存 / 商品自动上架' },
                quoteBox: { x: 40, y: 180, scale: 1, text: '自动完成商品上架、竞品监控、订单对账、库存预警等标准化运营动作' },
                mainImage: { x: 40, y: 300, scale: 1 }
            });

            // 监听变化，实时自动保存方案
            watch(elements, (val) => {
                localStorage.setItem('redcard_layout', JSON.stringify(val));
            }, { deep: true });

            const getStyle = (id) => ({
                transform: `translate(${elements.value[id].x}px, ${elements.value[id].y}px) scale(${elements.value[id].scale})`
            });

            // AI 智能生成模拟 (解析参考图布局)
            const aiGenerate = () => {
                alert("AI 正在解析参考图布局...");
                // 模拟 AI 解析出的坐标偏移（参考布局即可）
                // 实际生产中这里对接后端 AI 解析接口
                elements.value.textGroup.x = Math.random() * 50;
                elements.value.textGroup.y = 50 + Math.random() * 30;
                elements.value.mainImage.x = 20 + Math.random() * 50;
                elements.value.mainImage.y = 250 + Math.random() * 100;
                
                if (rawText.value) {
                    elements.value.textGroup.title = rawText.value.substring(0, 10);
                }
            };

            const uploadRef = (e) => { refImage.value = URL.createObjectURL(e.target.files[0]); };
            const uploadMain = (e) => { mainImage.value = URL.createObjectURL(e.target.files[0]); };

            const resetElement = (id) => {
                elements.value[id].x = 40;
                elements.value[id].scale = 1;
            };

            const download = () => {
                const canvas = document.getElementById('poster-canvas');
                html2canvas(canvas, { scale: 3, useCORS: true }).then(c => {
                    const link = document.createElement('a');
                    link.download = `GeekDance_Poster_${Date.now()}.png`;
                    link.href = c.toDataURL();
                    link.click();
                });
            };

            onMounted(() => {
                // 初始化拖拽库：Interact.js
                interact('.draggable').draggable({
                    listeners: {
                        move(event) {
                            const id = event.target.id;
                            elements.value[id].x += event.dx;
                            elements.value[id].y += event.dy;
                        }
                    }
                });
            });

            return { refImage, mainImage, rawText, elements, selectedId, getStyle, uploadRef, uploadMain, aiGenerate, download, resetElement };
        }
    }).mount('#app');
</script>

</body>
</html>
