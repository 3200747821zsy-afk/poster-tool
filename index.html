<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极客跳动海报工厂 v2.7 - 精准底栏版</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .editor-panel { width: 30%; background-color: white; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); height: 95vh; overflow-y: auto; }
        .poster-canvas { width: 500px; height: 700px; background: white; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); flex-shrink: 0; }
        
        /* 引用框样式 */
        .quote-box { background: rgba(37, 99, 235, 0.05); border: 1px solid rgba(37, 99, 235, 0.15); border-radius: 0.75rem; padding: 1rem; position: relative; }
        .quote-icon { position: absolute; right: -10px; top: -10px; font-size: 1.5rem; color: #fbbf24; background: white; padding: 2px; border-radius: 50%; }

        /* 自由图片容器 */
        .free-image-container { width: 100%; margin-top: 1rem; display: flex; justify-content: center; align-items: flex-start; }
        .resizable-image { max-width: 100%; transition: transform 0.1s; }

        /* [核心更新] 100% 还原胶囊底栏 */
        .capsule-footer {
            background: white;
            border-radius: 999px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            padding: 8px 24px;
            gap: 20px;
        }
        .footer-item { display: flex; align-items: center; gap: 8px; }
        .footer-icon-circle {
            width: 32px;
            height: 32px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }
        .footer-text-group { display: flex; flex-direction: column; line-height: 1.1; }
        .footer-text-main { font-size: 13px; font-weight: 900; color: #000; }
        .footer-text-sub { font-size: 9px; color: #333; font-weight: 500; }
    </style>
</head>
<body class="p-4 flex">

<div id="app" class="flex-1 flex gap-6">

    <div class="editor-panel">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-wand-magic-sparkles text-blue-600"></i> 海报精准优化
        </h2>

        <div class="space-y-6">
            <section class="bg-gray-50 p-4 rounded-xl border">
                <h3 class="font-bold text-sm text-gray-500 mb-3">文字内容</h3>
                <input v-model="content.mock_title_prefix" type="text" placeholder="标题前缀" class="w-full p-2 border rounded mb-2 text-sm">
                <input v-model="content.mock_title_core" type="text" placeholder="标题核心" class="w-full p-2 border rounded mb-2 text-sm">
                <input v-model="content.mock_subtitle" type="text" placeholder="副标题" class="w-full p-2 border rounded mb-2 text-sm">
                <textarea v-model="content.mock_quote" class="w-full p-2 border rounded text-sm h-20"></textarea>
            </section>

            <section class="bg-gray-50 p-4 rounded-xl border">
                <h3 class="font-bold text-sm text-gray-500 mb-3">主体截图</h3>
                <button @click="$refs.screenInput.click()" class="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-bold">更换截图</button>
                <input type="file" ref="screenInput" hidden @change="handleScreenUpload">
                <div class="mt-4">
                    <div class="flex justify-between text-xs text-gray-400 mb-1">
                        <span>缩放图片</span>
                        <span>{{Math.round(content.imageScale*100)}}%</span>
                    </div>
                    <input type="range" v-model="content.imageScale" min="0.3" max="2.0" step="0.01" class="w-full">
                </div>
                <div class="mt-4">
                    <div class="flex justify-between text-xs text-gray-400 mb-1">
                        <span>上下位置</span>
                    </div>
                    <input type="range" v-model="content.imageY" min="-100" max="200" step="1" class="w-full">
                </div>
            </section>

            <section class="bg-gray-50 p-4 rounded-xl border">
                <h3 class="font-bold text-sm text-gray-500 mb-3">品牌 Logo</h3>
                <button @click="$refs.logoInput.click()" class="w-full py-2 bg-white border rounded text-sm">上传左下角 Logo</button>
                <input type="file" ref="logoInput" hidden @change="handleLogoUpload">
            </section>
        </div>

        <button @click="downloadPoster" class="w-full bg-black text-white py-4 rounded-2xl font-bold mt-8 shadow-lg hover:opacity-90">
            保存高清海报
        </button>
    </div>

    <div class="flex-1 flex justify-center items-start">
        <div id="poster-canvas" class="poster-canvas bg-white" ref="posterCanvas">
            
            <div class="px-10 pt-14">
                <h1 class="text-4xl font-black text-gray-900 leading-tight">
                    {{content.mock_title_prefix}} 
                    <span class="text-blue-600">{{content.mock_title_core}}</span>
                </h1>
                <p class="text-xl mt-1 font-medium text-gray-500 tracking-tight">{{content.mock_subtitle}}</p>
                
                <div class="mt-5 quote-box">
                    <i class="fa-solid fa-quote-right quote-icon"></i>
                    <p class="text-[13px] text-blue-700/80 leading-relaxed font-bold">
                        {{content.mock_quote}}
                    </p>
                </div>
            </div>

            <div class="free-image-container px-4" :style="{ marginTop: content.imageY + 'px' }">
                <img v-if="content.screenUrl" 
                     :src="content.screenUrl" 
                     class="resizable-image"
                     :style="{ transform: `scale(${content.imageScale})` }">
            </div>

            <div class="absolute bottom-6 w-full px-8 flex justify-between items-center">
                <img :src="config.logoUrl" class="h-8 object-contain">

                <div class="capsule-footer">
                    <div class="footer-item">
                        <div class="footer-icon-circle">
                            <i class="fa-solid fa-link text-[12px]"></i>
                        </div>
                        <div class="footer-text-group">
                            <span class="footer-text-main">小程序</span>
                            <span class="footer-text-sub">定制开发</span>
                        </div>
                    </div>
                    <div class="footer-item">
                        <div class="footer-icon-circle">
                            <i class="fa-solid fa-a text-[12px]"></i>
                        </div>
                        <div class="footer-text-group">
                            <span class="footer-text-main">APP</span>
                            <span class="footer-text-sub">定制开发</span>
                        </div>
                    </div>
                    <div class="footer-item">
                        <div class="footer-icon-circle">
                            <i class="fa-solid fa-table-cells-large text-[12px]"></i>
                        </div>
                        <div class="footer-text-group">
                            <span class="footer-text-main">系统</span>
                            <span class="footer-text-sub">定制开发</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="absolute right-[-60px] top-1/2 -translate-y-1/2 text-[120px] font-black text-gray-50/80 pointer-events-none -z-10 rotate-90 opacity-20">
                GEEKDANCE
            </div>
        </div>
    </div>

</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const config = ref({
                logoUrl: 'https://geekdance.com/wp-content/uploads/2021/01/p_01.png'
            });

            const content = ref({
                mock_title_prefix: '跨境贸易',
                mock_title_core: 'AI Agent',
                mock_subtitle: '自动监测库存数据 / 商品自动上架',
                mock_quote: '自动完成商品上架 / 竞品监控 / 订单对账 / 库存预警等标准化运营动作',
                screenUrl: 'https://img.js.design/assets/static/769f7c0260788647c2117565bc938596', // 默认占位图
                imageScale: 0.85,
                imageY: 20
            });

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) config.value.logoUrl = URL.createObjectURL(file);
            };

            const handleScreenUpload = (e) => {
                const file = e.target.files[0];
                if (file) content.value.screenUrl = URL.createObjectURL(file);
            };

            const downloadPoster = () => {
                const element = document.getElementById('poster-canvas');
                html2canvas(element, { useCORS: true, scale: 3 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `GeekDance_Poster.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            };

            return { config, content, handleLogoUpload, handleScreenUpload, downloadPoster };
        }
    }).mount('#app');
</script>

</body>
</html>
